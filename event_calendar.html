<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSM Event Calendar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Adobe+Clean:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --adobe-red: #FA0F00;
    --adobe-dark: #1a1a1a;
    --adobe-gray: #2c2c2c;
    --adobe-light-gray: #f5f5f5;
    --adobe-mid-gray: #6e6e6e;
    --adobe-border: #e0e0e0;
    --completed: #2DA44E;
    --scheduled: #0070F3;
    --planning: #F59E0B;
    --cell-height: 120px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f0f0f0;
    color: var(--adobe-dark);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--adobe-dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .adobe-logo {
    width: 38px;
    height: 38px;
  }
  .header-title {
    color: white;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .header-subtitle {
    color: #999;
    font-size: 12px;
    margin-top: 2px;
  }
  .nav-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.2); }
  .month-display {
    color: white;
    font-size: 16px;
    font-weight: 700;
    min-width: 140px;
    text-align: center;
  }
  .today-btn {
    background: var(--adobe-red);
    border: none;
    color: white;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    transition: opacity 0.2s;
  }
  .today-btn:hover { opacity: 0.85; }

  /* Upload Zone */
  .upload-bar {
    background: white;
    border-bottom: 1px solid var(--adobe-border);
    padding: 10px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .upload-zone {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--adobe-red);
    background: #fff5f5;
  }
  .upload-icon { font-size: 20px; }
  .upload-text { font-size: 13px; color: var(--adobe-mid-gray); }
  .upload-text strong { color: var(--adobe-dark); }
  .upload-status {
    margin-left: auto;
    font-size: 12px;
    color: var(--completed);
    font-weight: 700;
  }
  #fileInput { display: none; }

  /* Legend */
  .toolbar {
    background: white;
    border-bottom: 2px solid var(--adobe-border);
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    max-width: 1600px;
    margin: 0 auto;
  }
  .legend-label { font-size: 11px; color: var(--adobe-mid-gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .legend-items { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .dot-completed { background: var(--completed); }
  .dot-scheduled { background: var(--scheduled); }
  .dot-planning { background: var(--planning); }
  .stats-area { margin-left: auto; display: flex; gap: 16px; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--adobe-dark); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--adobe-mid-gray); margin-top: 2px; }

  /* Main Calendar */
  .calendar-wrapper {
    max-width: 1600px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .calendar-grid {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--adobe-dark);
  }
  .day-header {
    padding: 10px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .day-header.weekend { color: #ff6b6b; }
  .calendar-body {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--adobe-border);
  }
  .day-cell {
    background: white;
    min-height: var(--cell-height);
    padding: 6px;
    position: relative;
    overflow: hidden;
  }
  .day-cell.other-month { background: #fafafa; }
  .day-cell.today { background: #fff8f8; }
  .day-cell.today .day-num { background: var(--adobe-red); color: white; }
  .day-num {
    font-size: 12px;
    font-weight: 700;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
    color: var(--adobe-dark);
  }
  .day-num.weekend { color: #cc4444; }
  .day-num.other-month-num { color: #ccc; }

  /* Event chips */
  .event-chip {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-bottom: 2px;
    cursor: pointer;
    line-height: 1.4;
    transition: opacity 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
    display: block;
  }
  .event-chip:hover { opacity: 0.85; transform: translateX(2px); }
  .event-chip.completed { background: #e8f5e9; color: #1a6b2e; border-left: 3px solid var(--completed); }
  .event-chip.scheduled { background: #e8f0fe; color: #1a56c4; border-left: 3px solid var(--scheduled); }
  .event-chip.in-planning { background: #fff8e1; color: #92600a; border-left: 3px solid var(--planning); }
  .event-name { font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .more-events {
    font-size: 10px;
    color: var(--adobe-mid-gray);
    cursor: pointer;
    padding: 1px 4px;
    font-weight: 700;
  }
  .more-events:hover { color: var(--adobe-red); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 480px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--adobe-border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: sticky;
    top: 0;
    background: white;
  }
  .modal-date { font-size: 13px; color: var(--adobe-mid-gray); margin-bottom: 4px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--adobe-mid-gray);
    padding: 0 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--adobe-dark); }
  .modal-body { padding: 20px 24px; }
  .modal-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .badge-completed { background: #e8f5e9; color: #1a6b2e; }
  .badge-scheduled { background: #e8f0fe; color: #1a56c4; }
  .badge-planning { background: #fff8e1; color: #92600a; }
  .detail-row { margin-bottom: 14px; }
  .detail-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--adobe-mid-gray);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .detail-value { font-size: 14px; color: var(--adobe-dark); line-height: 1.5; }
  .solution-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .solution-tag {
    background: #f0f0f0;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--adobe-dark);
  }
  .solution-tag.adobe-red { background: #fff0f0; color: var(--adobe-red); border: 1px solid #fcc; }

  /* Day events modal */
  .day-events-list { list-style: none; }
  .day-event-item {
    padding: 12px;
    border: 1px solid var(--adobe-border);
    border-radius: 6px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 4px solid var(--completed);
  }
  .day-event-item.scheduled { border-left-color: var(--scheduled); }
  .day-event-item.in-planning { border-left-color: var(--planning); }
  .day-event-item:hover { background: var(--adobe-light-gray); transform: translateX(2px); }
  .day-event-name { font-weight: 700; font-size: 14px; }
  .day-event-meta { font-size: 12px; color: var(--adobe-mid-gray); margin-top: 2px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--adobe-mid-gray);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--adobe-dark); }
  .empty-sub { font-size: 13px; }

  /* Member filter chips */
  .filter-section {
    background: white;
    border-bottom: 1px solid var(--adobe-border);
    padding: 8px 24px;
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--adobe-mid-gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .member-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .member-chip {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    border: 1.5px solid var(--adobe-border);
    background: white;
    color: var(--adobe-mid-gray);
    transition: all 0.15s;
    font-weight: 500;
  }
  .member-chip.active {
    background: var(--adobe-dark);
    color: white;
    border-color: var(--adobe-dark);
  }
  .member-chip:hover:not(.active) { border-color: var(--adobe-dark); color: var(--adobe-dark); }
  .all-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    background: var(--adobe-red);
    color: white;
    border: 1.5px solid var(--adobe-red);
    font-weight: 700;
    transition: opacity 0.15s;
  }
  .all-chip:hover { opacity: 0.85; }
</style>
</head>

<!-- Header -->
<div class="header">
  <div class="header-inner">

      <svg class="adobe-logo" viewBox="0 0 100 100" fill="none">
        <rect width="100" height="100" rx="8" fill="#FA0F00"/>

        <path d="M50 28L64 68H36L50 28Z" fill="#FA0F00"/>

<!-- Member filter -->

  <div class="member-chips" id="memberChips"></div>

</div>

<!-- Toolbar with legend and stats -->

      <div class="legend-item"><div class="legend-dot dot-planning"></div> In Planning</div>
    </div>
    <div class="stats-area" id="statsArea"></div>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrapper">
  <div class="calendar-grid">
    <div class="day-headers">
      <div class="day-header weekend">日</div>
      <div class="day-header">月</div>
      <div class="day-header">火</div>
      <div class="day-header">水</div>
      <div class="day-header">木</div>
      <div class="day-header">金</div>
      <div class="day-header weekend">土</div>
    </div>
    <div class="calendar-body" id="calendarBody"></div>
  </div>
</div>

<!-- Subtle upload area at bottom -->
<div style="max-width:1600px; margin:0 auto; padding:8px 24px 24px;">
  <details style="background:white; border:1px solid var(--adobe-border); border-radius:6px; overflow:hidden;">
    <summary style="padding:8px 14px; font-size:11px; color:#999; cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; user-select:none;">
      <span style="font-size:13px;">🔄</span>
      <span>データ更新（管理者用）</span>
      <span id="uploadStatus" style="margin-left:auto; color:var(--completed); font-weight:700;"></span>
    </summary>
    <div style="padding:10px 14px 12px; border-top:1px solid var(--adobe-border); background:#fafafa;">
      <div id="uploadZone" style="border:1.5px dashed #ccc; border-radius:6px; padding:10px 16px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:all 0.2s; background:white;">
        <span style="font-size:16px;">📂</span>
        <span style="font-size:12px; color:#888;">XLSXをここにドロップ、またはクリックして選択</span>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
    </div>
  </details>
</div>

<!-- Modal overlays -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="dayModalOverlay" onclick="closeDayModal()">
  <div class="modal" id="dayModal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-date" id="dayModalDate"></div>
        <div class="modal-title" id="dayModalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeDayModal()">×</button>
    </div>
    <div class="modal-body" id="dayModalBody"></div>
  </div>
</div>

// ============ PARSE EXCEL DATE ============
function excelDateToJSDate(serial) {
  if (!serial) return null;
  if (serial instanceof Date) return serial;
  if (typeof serial === 'string' && serial.includes('-')) return new Date(serial);
  const utc = (serial - 25569) * 86400 * 1000;
  return new Date(utc);
}

// ============ LOAD DEFAULT DATA ============
function loadDefaultData() {
  allEvents = DEFAULT_DATA.map(d => ({
    date: new Date(d.date),
    name: d.name,
    solution: d.solution,
    contributor: d.contributor,
    onsite: d.onsite || 'No',
    status: d.status
  }));
  document.getElementById('uploadStatus').textContent = `初期データ読み込み済み（${allEvents.length}件）`;
  renderAll();
}

// ============ PARSE XLSX ============
function parseXLSX(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, { type: 'array' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1 });
  
  const headers = raw[0];
  const colIdx = {};
  headers.forEach((h, i) => { if (h) colIdx[h.trim()] = i; });

  const needed = ['Event Date','Parent Name','Solution','CSS Contributor','Event Type','Event Status'];
  const missing = needed.filter(k => colIdx[k] === undefined);
  if (missing.length) {
    alert('列が見つかりません: ' + missing.join(', ') + '\n\nB列: Parent Name, D列: Solution, H列: CSS Contributor, I列: Event Date が必要です。');
    return;
  }

  const events = [];
  for (let r = 1; r < raw.length; r++) {
    const row = raw[r];
    // ① Event Type フィルタ: Adobe Day / Creative Jam のみ
    const eventType = String(row[colIdx['Event Type']] || '');
    if (eventType !== TARGET_EVENT_TYPE) continue;
    // ② CSS Contributor フィルタ: 対象7名のいずれかを含む
    const contributor = String(row[colIdx['CSS Contributor']] || '');
    const hasJapanMember = JAPAN_CSM_MEMBERS.some(m => contributor.includes(m));
    if (!hasJapanMember) continue;

    const rawDate = row[colIdx['Event Date']];
    const date = excelDateToJSDate(rawDate);
    if (!date || isNaN(date.getTime())) continue;

    events.push({
      date,
      name: String(row[colIdx['Parent Name']] || ''),
      solution: String(row[colIdx['Solution']] || ''),
      contributor,
      onsite: colIdx['Onsite'] !== undefined ? String(row[colIdx['Onsite']] || 'No') : 'No',
      status: String(row[colIdx['Event Status']] || '')
    });
  }
  
  allEvents = events;
  document.getElementById('uploadStatus').textContent = `✓ ${events.length}件のイベントを読み込みました`;
  renderAll();
}

// ============ DRAG & DROP UPLOAD ============
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = 'var(--adobe-red)'; uploadZone.style.background = '#fff5f5'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = '#ccc'; uploadZone.style.background = 'white'; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => parseXLSX(e.target.result);
  reader.readAsArrayBuffer(file);
}

// ============ MEMBER FILTER ============
function buildMemberChips() {
  const container = document.getElementById('memberChips');
  container.innerHTML = '';
  JAPAN_CSM_MEMBERS.forEach(m => {
    const chip = document.createElement('button');
    chip.className = 'member-chip active';
    chip.textContent = m.split(' ')[0]; // 名前のみ表示
    chip.title = m;
    chip.dataset.member = m;
    chip.addEventListener('click', () => toggleMember(m, chip));
    container.appendChild(chip);
  });
}

function toggleMember(member, chip) {
  if (activeMembers.has(member)) {
    activeMembers.delete(member);
    chip.classList.remove('active');
  } else {
    activeMembers.add(member);
    chip.classList.add('active');
  }
  renderAll();
}

document.getElementById('allChip').addEventListener('click', () => {
  activeMembers = new Set(JAPAN_CSM_MEMBERS);
  document.querySelectorAll('.member-chip').forEach(c => c.classList.add('active'));
  renderAll();
});

// ============ FILTER EVENTS ============
function getFilteredEvents() {
  return allEvents.filter(ev => {
    return JAPAN_CSM_MEMBERS.some(m => activeMembers.has(m) && ev.contributor.includes(m));
  });
}

// ============ RENDER ============
function renderAll() {
  filteredEvents = getFilteredEvents();
  renderStats();
  renderCalendar();
}

function renderStats() {
  const ev = filteredEvents;
  const now = new Date();
  const upcoming = ev.filter(e => e.date >= now && e.status !== 'Completed');
  const thisMonth = ev.filter(e => e.date.getMonth() === currentDate.getMonth() && e.date.getFullYear() === currentDate.getFullYear());
  
  const statsArea = document.getElementById('statsArea');
  statsArea.innerHTML = `
    <div class="stat-item">
      <div class="stat-num">${ev.length}</div>
      <div class="stat-label">総イベント</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--scheduled)">${upcoming.length}</div>
      <div class="stat-label">今後の予定</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" style="color:var(--adobe-red)">${thisMonth.length}</div>
      <div class="stat-label">今月</div>
    </div>
  `;
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  document.getElementById('monthDisplay').textContent = `${year}年 ${month + 1}月`;
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay();
  
  const today = new Date();
  today.setHours(0,0,0,0);
  
  // Group events by date string
  const eventsByDate = {};
  filteredEvents.forEach(ev => {
    const key = ev.date.toISOString().slice(0,10);
    if (!eventsByDate[key]) eventsByDate[key] = [];
    eventsByDate[key].push(ev);
  });
  
  const body = document.getElementById('calendarBody');
  body.innerHTML = '';
  
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;
  
  for (let i = 0; i < totalCells; i++) {
    const dayOffset = i - startDow;
    const cellDate = new Date(year, month, 1 + dayOffset);
    cellDate.setHours(0,0,0,0);
    
    const isCurrentMonth = cellDate.getMonth() === month;
    const isToday = cellDate.getTime() === today.getTime();
    const dow = cellDate.getDay();
    const dateKey = cellDate.toISOString().slice(0,10);
    const dayEvents = eventsByDate[dateKey] || [];
    
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (!isCurrentMonth ? ' other-month' : '') + (isToday ? ' today' : '');
    
    const numClass = 'day-num' + (dow === 0 || dow === 6 ? ' weekend' : '') + (!isCurrentMonth ? ' other-month-num' : '');
    cell.innerHTML = `<div class="${numClass}">${cellDate.getDate()}</div>`;
    
    const MAX_SHOW = 3;
    const showEvents = dayEvents.slice(0, MAX_SHOW);
    
    showEvents.forEach(ev => {
      const chip = document.createElement('div');
      const statusClass = ev.status === 'Completed' ? 'completed' : ev.status === 'Scheduled' ? 'scheduled' : 'in-planning';
      chip.className = `event-chip ${statusClass}`;
      chip.innerHTML = `<span class="event-name">${ev.name}</span>`;
      chip.addEventListener('click', (e) => { e.stopPropagation(); showEventDetail(ev); });
      cell.appendChild(chip);
    });
    
    if (dayEvents.length > MAX_SHOW) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = `+${dayEvents.length - MAX_SHOW}件`;
      more.addEventListener('click', (e) => { e.stopPropagation(); showDayEvents(cellDate, dayEvents); });
      cell.appendChild(more);
    }
    
    body.appendChild(cell);
  }
}

// ============ MODALS ============
function showEventDetail(ev) {
  const solutions = ev.solution.split(',').map(s => s.trim()).filter(Boolean);
  const statusClass = ev.status === 'Completed' ? 'badge-completed' : ev.status === 'Scheduled' ? 'badge-scheduled' : 'badge-planning';
  const isOnsite = ev.onsite === 'Yes';
  const onsiteBadge = isOnsite
    ? `<span style="display:inline-flex;align-items:center;gap:5px;background:#fff0f0;color:#c00;border:1px solid #fcc;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;">🏢 オンサイト</span>`
    : `<span style="display:inline-flex;align-items:center;gap:5px;background:#f0f4ff;color:#1a56c4;border:1px solid #c0d0f8;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;">💻 オンライン</span>`;

  const dateStr = ev.date.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  document.getElementById('modalDate').textContent = dateStr;
  document.getElementById('modalTitle').textContent = ev.name;
  document.getElementById('modalBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <span class="modal-badge ${statusClass}">${ev.status}</span>
      ${onsiteBadge}
    </div>
    <div class="detail-row">
      <div class="detail-label">👤 CSS Contributor</div>
      <div class="detail-value">${ev.contributor}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">🔧 Solution（補足情報）</div>
      <div class="solution-tags">${solutions.length ? solutions.map(s => `<span class="solution-tag adobe-red">${s}</span>`).join('') : '<span style="color:#999;font-size:13px;">—</span>'}</div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function showDayEvents(date, events) {
  const dateStr = date.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  document.getElementById('dayModalDate').textContent = dateStr;
  document.getElementById('dayModalTitle').textContent = `${events.length}件のイベント`;
  
  const list = document.createElement('ul');
  list.className = 'day-events-list';
  events.forEach(ev => {
    const statusClass = ev.status === 'Completed' ? 'completed' : ev.status === 'Scheduled' ? 'scheduled' : 'in-planning';
    const li = document.createElement('li');
    li.className = `day-event-item ${statusClass}`;
    li.innerHTML = `<div class="day-event-name">${ev.name}</div><div class="day-event-meta">${ev.type} · ${ev.status} · ${ev.contributor.split(',')[0].trim()}</div>`;
    li.addEventListener('click', () => { closeDayModal(); setTimeout(() => showEventDetail(ev), 100); });
    list.appendChild(li);
  });
  document.getElementById('dayModalBody').innerHTML = '';
  document.getElementById('dayModalBody').appendChild(list);
  document.getElementById('dayModalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeDayModal() { document.getElementById('dayModalOverlay').classList.remove('open'); }

// ============ NAV ============
document.getElementById('prevBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderAll();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderAll();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  currentDate = new Date();
  renderAll();
});

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDayModal(); }
  if (e.key === 'ArrowLeft') { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); }
  if (e.key === 'ArrowRight') { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); }
});

// ============ INIT ============
buildMemberChips();
loadDefaultData();
</script>
